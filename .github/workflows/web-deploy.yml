name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation
        run: npm ci --legacy-peer-deps

      - name: 🚀 Build
        # On force l'export statique proprement
        run: npx expo export --platform web --clear

      - name: 🛠️ Setup GitHub Pages Redirection
        run: |
          # Création du fichier 404 pour gérer le routage SPA
          cp dist/index.html dist/404.html
          # Forcer le chemin de base dans le index.html si Expo l'a oublié
          sed -i 's|src="/|src="/app-us-belleu/|g' dist/index.html
          sed -i 's|href="/_expo|href="/app-us-belleu/_expo|g' dist/index.html
          sed -i 's|src="/_expo|src="/app-us-belleu/_expo|g' dist/index.html

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: 🌐 Déploiement
        uses: actions/deploy-pages@v4