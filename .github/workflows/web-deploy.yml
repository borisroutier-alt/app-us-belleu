name: Déploiement Web PWA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # On passe en version 20 pour corriger l'erreur de version
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: |
          npm install
          npm install fetch-nodeshim --save-dev

      - name: 🔑 Réparer les permissions d'exécution
        run: |
          chmod +x node_modules/.bin/expo
          chmod -R +x node_modules/expo/bin
        continue-on-error: true

      - name: 🚀 Compilation du site Web Expo
        run: npx expo export --platform web

      - name: 🌐 Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages