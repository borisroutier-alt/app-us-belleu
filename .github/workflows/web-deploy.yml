name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write      # Nécessaire pour le déploiement
      id-token: write   # Nécessaire pour l'authentification
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        run: |
          npm ci --legacy-peer-deps
          npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_BASE_URL: "/app-us-belleu/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy
        uses: actions/deploy-pages@v4