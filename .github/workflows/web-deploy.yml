name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🚀 Compilation du site Web Expo
        run: npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_BASE_URL: "/app-us-belleu/"

      - name: 🛠️ Correction chirurgicale des chemins
        run: |
          # Cette commande remplace systématiquement les chemins qui commencent par /_expo
          # par des chemins relatifs _expo
          # On utilise sed pour modifier le fichier index.html généré
          sed -i 's|src="/_expo|src="_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="_expo|g' dist/index.html
          sed -i 's|src="/assets|src="./assets|g' dist/index.html
          sed -i 's|href="/assets|href="./assets|g' dist/index.html

      - name: 🌐 Déploiement
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-artifact