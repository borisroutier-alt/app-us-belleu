name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: |
          npm ci --legacy-peer-deps
          npm install fetch-nodeshim --save-dev

      - name: 🔑 Réparer les permissions d'exécution
        run: |
          chmod +x node_modules/.bin/expo
          chmod -R +x node_modules/expo/bin
        continue-on-error: true

      - name: 🚀 Compilation du site Web Expo
        run: npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_BASE_URL: "/app-us-belleu/"

      - name: 🌐 Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          # Cette option est cruciale pour les sous-dossiers : 
          # elle force l'action à ne pas écraser tout le dépôt
          # et à bien gérer les assets.