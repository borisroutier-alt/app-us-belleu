name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: |
          npm ci --legacy-peer-deps

      - name: 🚀 Compilation du site Web Expo
        run: npx expo export --platform web --clear

      - name: 🛠️ Correction des chemins pour GitHub Pages
        run: |
          # 1. On remplace les chemins commençant par /_expo par des chemins relatifs _expo
          # Cela transforme <script src="/_expo/..."> en <script src="_expo/...">
          sed -i 's|src="/_expo|src="_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="_expo|g' dist/index.html
          
          # 2. On traite aussi les autres assets si nécessaire
          sed -i 's|href="/assets|href="./assets|g' dist/index.html
          sed -i 's|src="/assets|src="./assets|g' dist/index.html

      - name: 🌐 Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main