name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation
        run: npm ci --legacy-peer-deps

      - name: 🚀 Build
        # Le flag --clear assure une build propre
        run: npx expo export --platform web --clear

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: 🌐 Déploiement
        uses: actions/deploy-pages@v4