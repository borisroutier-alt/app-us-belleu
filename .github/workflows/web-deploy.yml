name: Déploiement Web PWA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 Checkout du code
        uses: actions/checkout@v4

      - name: 🛠️ Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🔑 Réparer les permissions d'exécution
        run: |
          chmod +x node_modules/.bin/expo
          chmod -R +x node_modules/expo/bin
        continue-on-error: true

      - name: 🚀 Compilation du site Web Expo
        run: npx expo export --platform web

      - name: 🌐 Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages # On envoie le site ici pour ne pas écraser ton code sur 'main'