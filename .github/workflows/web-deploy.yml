name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation et permissions
        run: |
          npm ci --legacy-peer-deps
          # On donne explicitement les droits d'exécution
          chmod -R +x node_modules/.bin/

      - name: Compilation
        run: npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_BASE_URL: "/app-us-belleu/"

      - name: 🛠️ Réparation des chemins (Méthode robuste)
        run: |
          # Correction du slash initial pour éviter le saut à la racine
          # On remplace src="/_expo" par src="./_expo"
          sed -i 's|src="/_expo|src="./_expo|g' dist/index.html
          sed -i 's|href="/_expo|href="./_expo|g' dist/index.html
          sed -i 's|src="/assets|src="./assets|g' dist/index.html
          sed -i 's|href="/assets|href="./assets|g' dist/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4