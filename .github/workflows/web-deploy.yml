name: Déploiement Web PWA

on:
  push:
    branches:
      - code-source

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation et permissions
        run: |
          npm ci --legacy-peer-deps
          # On donne explicitement les droits d'exécution
          chmod -R +x node_modules/.bin/

      - name: 🚀 Compilation
        run: npx expo export --platform web --clear

      - name: 🛠️ Réparation des chemins
        run: |
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html

      # ÉTAPE AJOUTÉE : Création explicite de l'artefact
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      # ÉTAPE MODIFIÉE : Déploiement utilisant l'artefact créé
      - name: 🌐 Déploiement
        uses: actions/deploy-pages@v4