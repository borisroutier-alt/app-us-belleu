name: Build APK Club
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout du projet
        uses: actions/checkout@v3

      - name: 🟢 Configuration de Node.js (Version requise par EAS)
        uses: actions/setup-node@v3
        with:
          node-version: 20 # <-- On passe en version 20 pour valider les prérequis d'EAS

      - name: ☕ Configuration de Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🚀 Configuration de l'environnement Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Dépendances du projet
        run: npm install

      - name: 🛠 Compilation de l'APK (Preview)
        run: eas build --platform android --profile preview --non-interactive