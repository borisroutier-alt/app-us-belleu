name: Build APK Dev (Sans Expo Cloud)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout du projet
        uses: actions/checkout@v3

      - name: 🟢 Configuration de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: ☕ Configuration de Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Installation des dépendances
        run: npm install

      - name: 🔑 Création du fichier google-services.json (à la racine)
        run: |
          cat <<EOF > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF
          echo "Vérification de la présence du fichier :"
          ls -l google-services.json

      - name: 🤖 Génération des fichiers natifs Android
        run: npx expo prebuild --platform android --clean --template expo-template-bare-minimum

      - name: 🏗 Compilation de l'APK de Debug (Dev)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 📦 Sauvegarder l'APK de DEV sur GitHub
        uses: actions/upload-artifact@v4
        with:
          name: app-club-dev-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk